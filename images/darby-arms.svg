<?xml version="1.0" encoding="utf-8" ?>
<svg version="1.1" baseProfile="full"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  preserveAspectRatio="xMidYMid meet"
  height="640" width="500" viewBox="0 0 1000 1280">

  <defs>
    <!-- DrawShield's exact heater shield mask path -->
    <mask id="shield-mask">
      <path fill="#FFFFFF" d="m 0,0 v 800 c -2.5063876,43.11115 1.2341419,84.33503 21.489586,125.13639 20.255443,40.80137 53.477613,79.98631 98.039434,115.63581 44.56181,35.6494 100.44867,67.7517 164.92346,94.7345 64.47479,26.9828 137.51639,48.8374 215.54752,64.4933 78.03113,-15.6559 151.07273,-37.5105 215.54752,-64.4933 64.47479,-26.9828 120.36165,-59.0851 164.92346,-94.7345 44.56182,-35.6495 77.78399,-74.83444 98.03943,-115.63581 C 998.76586,884.33503 1000.1453,841.93063 1000,800 V 0 Z"/>
    </mask>
    <clipPath id="shield-clip">
      <path d="m 0,0 v 800 c -2.5063876,43.11115 1.2341419,84.33503 21.489586,125.13639 20.255443,40.80137 53.477613,79.98631 98.039434,115.63581 44.56181,35.6494 100.44867,67.7517 164.92346,94.7345 64.47479,26.9828 137.51639,48.8374 215.54752,64.4933 78.03113,-15.6559 151.07273,-37.5105 215.54752,-64.4933 64.47479,-26.9828 120.36165,-59.0851 164.92346,-94.7345 44.56182,-35.6495 77.78399,-74.83444 98.03943,-115.63581 C 998.76586,884.33503 1000.1453,841.93063 1000,800 V 0 Z"/>
    </clipPath>
  </defs>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- CREST AREA (above shield, y 0-200)              -->
  <!-- ═══════════════════════════════════════════════ -->
  <g transform="translate(500,180)">
    <!-- Wreath / torse (twisted roll of cloth, argent and sable) -->
    <ellipse cx="0" cy="30" rx="120" ry="34" fill="#e8e8e8" stroke="#1a1a1a" stroke-width="4"/>
    <!-- Sable segments of wreath -->
    <rect x="-120" y="10" width="40" height="40" fill="#1a1a1a" rx="8"/>
    <rect x="-40" y="10" width="40" height="40" fill="#e8e8e8" rx="8"/>
    <rect x="40" y="10" width="40" height="40" fill="#1a1a1a" rx="8"/>
    <!-- Overlay ellipse border -->
    <ellipse cx="0" cy="30" rx="120" ry="34" fill="none" stroke="#1a1a1a" stroke-width="4"/>

    <!-- Antelope head erased gules (red) -->
    <!-- Neck (erased/torn base - irregular ragged edge) -->
    <path d="M -70,0 Q -50,-10 -20,-15 Q 0,-18 20,-15 Q 50,-10 70,0 Q 60,-30 40,-38 Q 20,-44 0,-45 Q -20,-44 -40,-38 Q -60,-30 -70,0 Z" fill="#9b1c1c"/>
    <!-- Head body -->
    <ellipse cx="0" cy="-120" rx="75" ry="90" fill="#9b1c1c"/>
    <!-- Muzzle -->
    <ellipse cx="0" cy="-200" rx="45" ry="38" fill="#9b1c1c"/>
    <!-- Nose/mouth detail -->
    <path d="M -20,-225 Q 0,-230 20,-225" stroke="#6b0e0e" stroke-width="5" fill="none" stroke-linecap="round"/>
    <circle cx="-12" cy="-218" r="6" fill="#6b0e0e"/>
    <circle cx="12" cy="-218" r="6" fill="#6b0e0e"/>
    <!-- Eye -->
    <circle cx="-38" cy="-155" r="14" fill="#1a1a1a"/>
    <circle cx="-33" cy="-152" r="5" fill="#fff" opacity="0.6"/>
    <!-- Ear -->
    <ellipse cx="-65" cy="-170" rx="18" ry="32" fill="#9b1c1c" transform="rotate(-25,-65,-170)"/>
    <ellipse cx="-65" cy="-170" rx="9" ry="18" fill="#c43030" transform="rotate(-25,-65,-170)"/>
    <!-- Mane (or/gold) - flowing from neck -->
    <path d="M -30,-45 Q -80,-80 -85,-130 Q -80,-160 -60,-170" stroke="#b8973a" stroke-width="9" fill="none" stroke-linecap="round"/>
    <path d="M -15,-45 Q -65,-75 -68,-120 Q -65,-148 -48,-158" stroke="#b8973a" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M 0,-45 Q -45,-70 -46,-110 Q -44,-136 -30,-145" stroke="#b8973a" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Horns (attired or/gold) - two tines each -->
    <!-- Left horn -->
    <path d="M -32,-200 Q -55,-240 -45,-285 Q -38,-310 -25,-305" stroke="#b8973a" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M -42,-252 Q -68,-262 -65,-248" stroke="#b8973a" stroke-width="7" fill="none" stroke-linecap="round"/>
    <!-- Right horn -->
    <path d="M 32,-200 Q 55,-240 45,-285 Q 38,-310 25,-305" stroke="#b8973a" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M 42,-252 Q 68,-262 65,-248" stroke="#b8973a" stroke-width="7" fill="none" stroke-linecap="round"/>
    <!-- Head outline -->
    <ellipse cx="0" cy="-120" rx="75" ry="90" fill="none" stroke="#6b0e0e" stroke-width="3"/>
    <ellipse cx="0" cy="-200" rx="45" ry="38" fill="none" stroke="#6b0e0e" stroke-width="2"/>
  </g>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- SHIELD (y 200-1150 in viewBox)                  -->
  <!-- ═══════════════════════════════════════════════ -->
  <g transform="translate(0,200)">
    <!-- Argent field (silver/white) -->
    <g mask="url(#shield-mask)">
      <rect x="0" y="0" width="1000" height="1200" fill="#f4f4f0"/>

      <!-- ── CHEVRON SABLE ── -->
      <!-- Chevron: inverted V, center at ~y=500, width thick enough to be bold -->
      <!-- Left arm: from bottom-left going up to center apex -->
      <!-- Right arm: from center apex going down to bottom-right -->
      <!-- Chevron thickness = 120 units -->
      <polygon points="
        500,310
        960,770  960,890
        500,430
        40,890   40,770
      " fill="#1a1a1a"/>

      <!-- ── GARB 1 — above chevron, center top ── -->
      <g transform="translate(500,160)">
        <!-- Wheat ears fanning upward -->
        <g fill="#1a1a1a">
          <ellipse cx="-60" cy="-60" rx="18" ry="32" transform="rotate(-28,-60,-60)"/>
          <ellipse cx="-36" cy="-75" rx="18" ry="32" transform="rotate(-16,-36,-75)"/>
          <ellipse cx="-12" cy="-82" rx="18" ry="32" transform="rotate(-5,-12,-82)"/>
          <ellipse cx="12" cy="-82" rx="18" ry="32" transform="rotate(5,12,-82)"/>
          <ellipse cx="36" cy="-75" rx="18" ry="32" transform="rotate(16,36,-75)"/>
          <ellipse cx="60" cy="-60" rx="18" ry="32" transform="rotate(28,60,-60)"/>
        </g>
        <!-- Stalks -->
        <line x1="-60" y1="-28" x2="-20" y2="20" stroke="#1a1a1a" stroke-width="5"/>
        <line x1="-36" y1="-43" x2="-10" y2="20" stroke="#1a1a1a" stroke-width="5"/>
        <line x1="-12" y1="-50" x2="0" y2="20" stroke="#1a1a1a" stroke-width="5"/>
        <line x1="12" y1="-50" x2="0" y2="20" stroke="#1a1a1a" stroke-width="5"/>
        <line x1="36" y1="-43" x2="10" y2="20" stroke="#1a1a1a" stroke-width="5"/>
        <line x1="60" y1="-28" x2="20" y2="20" stroke="#1a1a1a" stroke-width="5"/>
        <!-- Bundle body -->
        <ellipse cx="0" cy="50" rx="55" ry="40" fill="#1a1a1a"/>
        <!-- Gold band -->
        <rect x="-60" y="28" width="120" height="36" fill="#b8973a" rx="4"/>
        <!-- Straw base below band -->
        <ellipse cx="0" cy="95" rx="35" ry="48" fill="#1a1a1a"/>
        <!-- Small taper at very bottom -->
        <ellipse cx="0" cy="138" rx="16" ry="12" fill="#1a1a1a"/>
      </g>

      <!-- ── GARB 2 — lower left ── -->
      <g transform="translate(240,720)">
        <g fill="#1a1a1a">
          <ellipse cx="-60" cy="-60" rx="18" ry="32" transform="rotate(-28,-60,-60)"/>
          <ellipse cx="-36" cy="-75" rx="18" ry="32" transform="rotate(-16,-36,-75)"/>
          <ellipse cx="-12" cy="-82" rx="18" ry="32" transform="rotate(-5,-12,-82)"/>
          <ellipse cx="12" cy="-82" rx="18" ry="32" transform="rotate(5,12,-82)"/>
          <ellipse cx="36" cy="-75" rx="18" ry="32" transform="rotate(16,36,-75)"/>
          <ellipse cx="60" cy="-60" rx="18" ry="32" transform="rotate(28,60,-60)"/>
        </g>
        <line x1="-60" y1="-28" x2="-20" y2="20" stroke="#1a1a1a" stroke-width="5"/>
        <line x1="-36" y1="-43" x2="-10" y2="20" stroke="#1a1a1a" stroke-width="5"/>
        <line x1="-12" y1="-50" x2="0" y2="20" stroke="#1a1a1a" stroke-width="5"/>
        <line x1="12" y1="-50" x2="0" y2="20" stroke="#1a1a1a" stroke-width="5"/>
        <line x1="36" y1="-43" x2="10" y2="20" stroke="#1a1a1a" stroke-width="5"/>
        <line x1="60" y1="-28" x2="20" y2="20" stroke="#1a1a1a" stroke-width="5"/>
        <ellipse cx="0" cy="50" rx="55" ry="40" fill="#1a1a1a"/>
        <rect x="-60" y="28" width="120" height="36" fill="#b8973a" rx="4"/>
        <ellipse cx="0" cy="95" rx="35" ry="48" fill="#1a1a1a"/>
        <ellipse cx="0" cy="138" rx="16" ry="12" fill="#1a1a1a"/>
      </g>

      <!-- ── GARB 3 — lower right ── -->
      <g transform="translate(760,720)">
        <g fill="#1a1a1a">
          <ellipse cx="-60" cy="-60" rx="18" ry="32" transform="rotate(-28,-60,-60)"/>
          <ellipse cx="-36" cy="-75" rx="18" ry="32" transform="rotate(-16,-36,-75)"/>
          <ellipse cx="-12" cy="-82" rx="18" ry="32" transform="rotate(-5,-12,-82)"/>
          <ellipse cx="12" cy="-82" rx="18" ry="32" transform="rotate(5,12,-82)"/>
          <ellipse cx="36" cy="-75" rx="18" ry="32" transform="rotate(16,36,-75)"/>
          <ellipse cx="60" cy="-60" rx="18" ry="32" transform="rotate(28,60,-60)"/>
        </g>
        <line x1="-60" y1="-28" x2="-20" y2="20" stroke="#1a1a1a" stroke-width="5"/>
        <line x1="-36" y1="-43" x2="-10" y2="20" stroke="#1a1a1a" stroke-width="5"/>
        <line x1="-12" y1="-50" x2="0" y2="20" stroke="#1a1a1a" stroke-width="5"/>
        <line x1="12" y1="-50" x2="0" y2="20" stroke="#1a1a1a" stroke-width="5"/>
        <line x1="36" y1="-43" x2="10" y2="20" stroke="#1a1a1a" stroke-width="5"/>
        <line x1="60" y1="-28" x2="20" y2="20" stroke="#1a1a1a" stroke-width="5"/>
        <ellipse cx="0" cy="50" rx="55" ry="40" fill="#1a1a1a"/>
        <rect x="-60" y="28" width="120" height="36" fill="#b8973a" rx="4"/>
        <ellipse cx="0" cy="95" rx="35" ry="48" fill="#1a1a1a"/>
        <ellipse cx="0" cy="138" rx="16" ry="12" fill="#1a1a1a"/>
      </g>
    </g>

    <!-- Shield border -->
    <path d="m 0,0 v 800 c -2.5063876,43.11115 1.2341419,84.33503 21.489586,125.13639 20.255443,40.80137 53.477613,79.98631 98.039434,115.63581 44.56181,35.6494 100.44867,67.7517 164.92346,94.7345 64.47479,26.9828 137.51639,48.8374 215.54752,64.4933 78.03113,-15.6559 151.07273,-37.5105 215.54752,-64.4933 64.47479,-26.9828 120.36165,-59.0851 164.92346,-94.7345 44.56182,-35.6495 77.78399,-74.83444 98.03943,-115.63581 C 998.76586,884.33503 1000.1453,841.93063 1000,800 V 0 Z"
      fill="none" stroke="#1a1a1a" stroke-width="12"/>
  </g>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- MOTTO SCROLL (below shield)                     -->
  <!-- ═══════════════════════════════════════════════ -->
  <g transform="translate(0,1200)">
    <!-- Ribbon body -->
    <path d="M 80,20 Q 200,0 500,8 Q 800,0 920,20 Q 840,55 500,48 Q 160,55 80,20 Z"
          fill="#f0ede0" stroke="#2a2a2a" stroke-width="5"/>
    <!-- Left curl -->
    <path d="M 80,20 Q 40,12 50,35 Q 58,52 90,48" fill="#ddd8c0" stroke="#2a2a2a" stroke-width="4"/>
    <!-- Right curl -->
    <path d="M 920,20 Q 960,12 950,35 Q 942,52 910,48" fill="#ddd8c0" stroke="#2a2a2a" stroke-width="4"/>
    <!-- Motto text -->
    <text x="500" y="38" text-anchor="middle"
          font-family="Palatino Linotype, Palatino, Book Antiqua, serif"
          font-size="42" font-style="italic" fill="#1a1a1a" letter-spacing="3">
      Ut cunque placuerit Deo
    </text>
  </g>
</svg>
